<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5E5CE6"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- AR scanning lines -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
  </g>
  <!-- AR viewfinder -->
  <g transform="translate(300, 200)">
    <!-- Corner brackets -->
    <g stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
      <path d="M-80,-80 L-80,-50 M-80,-80 L-50,-80"/>
      <path d="M80,-80 L80,-50 M80,-80 L50,-80"/>
      <path d="M-80,80 L-80,50 M-80,80 L-50,80"/>
      <path d="M80,80 L80,50 M80,80 L50,80"/>
    </g>
    <!-- 3D floating cube -->
    <g opacity="0.85">
      <polygon points="0,-45 35,-25 35,15 0,35 -35,15 -35,-25" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
      <line x1="0" y1="-45" x2="0" y2="35" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <line x1="-35" y1="-25" x2="35" y2="15" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <line x1="35" y1="-25" x2="-35" y2="15" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    </g>
    <!-- Scanning dot -->
    <circle cx="0" cy="-5" r="4" fill="white" opacity="0.8"/>
  </g>
  <!-- Floating data points -->
  <circle cx="160" cy="120" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="450" cy="100" r="2.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="480" cy="300" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="140" cy="290" r="2" fill="rgba(255,255,255,0.25)"/>
</svg>
