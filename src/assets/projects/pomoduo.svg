<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9F0A"/>
      <stop offset="100%" stop-color="#FF453A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Two connected timer circles -->
  <g transform="translate(210, 200)">
    <!-- Timer ring 1 -->
    <circle cx="0" cy="0" r="70" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="white" stroke-width="4" stroke-dasharray="330 110" stroke-linecap="round" opacity="0.8" transform="rotate(-90)"/>
    <!-- Time display -->
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" opacity="0.9">25:00</text>
  </g>
  <g transform="translate(390, 200)">
    <!-- Timer ring 2 -->
    <circle cx="0" cy="0" r="70" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="white" stroke-width="4" stroke-dasharray="330 110" stroke-linecap="round" opacity="0.8" transform="rotate(-90)"/>
    <!-- Time display -->
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" opacity="0.9">25:00</text>
  </g>
  <!-- Connection line between timers -->
  <line x1="280" y1="200" x2="320" y2="200" stroke="white" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Sync icon -->
  <g transform="translate(300, 200)" opacity="0.6">
    <circle cx="0" cy="0" r="12" fill="rgba(255,255,255,0.2)"/>
    <path d="M-5,-4 L5,-4 L2,-7 M5,4 L-5,4 L-2,7" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Focus label -->
  <text x="300" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="2">FOCUS SESSION</text>
</svg>
